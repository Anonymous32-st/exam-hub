<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamHub - Teacher Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">ExamHub</div>
            <div class="header-right">
                <div class="user-info">
                    <div id="user-name" style="font-weight:600;"></div>
                    <div id="user-role" style="font-size:12px; color:var(--primary);"></div>
                </div>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <h2>Teacher Panel</h2>
                <p><strong>Subject:</strong></p>
                <p id="subject-display" style="color:var(--primary); font-weight:600;">Loading...</p>
                <p><strong>Class:</strong></p>
                <p id="class-display" style="color:var(--primary); font-weight:600; margin-bottom: 15px;">Loading...</p>
                <div data-action="showSetQuestions" class="sidebar-btn">📝 Set OBJ Questions</div>
                <div data-action="showSetTheoryQuestions" class="sidebar-btn">📝 Set Theory Questions</div>
                <div data-action="showGradeTheory" class="sidebar-btn" style="background:#5a2a8e; color:white;">📊 Grade Theory Exams</div>
                <div data-action="showGradeStudents" class="sidebar-btn" style="background:#2a8e5a; color:white;">⭐ Grade Students (C.A+Exam)</div>
                <div data-action="showUploadNotes" class="sidebar-btn">📚 Upload E-Notes</div>
                <div data-action="showManageTime" class="sidebar-btn">⏱️ Manage Time</div>
                <div data-action="showTeacherClassResults" class="sidebar-btn">📊 View Class Results</div>
                <div data-action="showResetStudent" class="sidebar-btn" style="background:var(--danger); color:white;">🔄 Reset Student Exam</div>
            </div>

            <div class="main">
                <h1 id="welcome-msg"></h1>
                <div id="content-area"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script src="utils.js"></script>
    <script src="teacher.js"></script>
</body>
</html>
